<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Access</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h2>Linkarooie Quick Access</h2>
    <input type="text" id="quickSearch" placeholder="Search or enter URL...">
    <button id="navigateBtn">Go</button>

    <h3>Favorites:</h3>
    <div id="shortcuts">
    <!-- Links will be loaded here -->
    </div>

    <h3>Add New Shortcut:</h3>
    <input type="text" id="linkName" placeholder="Name of link">
    <input type="text" id="linkURL" placeholder="URL">
    <button id="addShortcutBtn">Add</button>

    <script src="popup.js"></script>
</body>
</html>
